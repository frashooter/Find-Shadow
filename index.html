<style>
body { margin:0; background:black; }

img {
  width:100%;
  height:100vh;
  object-fit:cover;
}

.overlay {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:rgba(0,0,0,0.8);
  color:white;
  padding:25px;
  text-align:center;
  border-radius:10px;
  font-family:Arial;
}

.overlay h1 { margin:0; font-size:32px; }
.overlay h2 { margin:10px 0 0; font-size:26px; color:#00ffcc; }
.overlay p { margin:10px 0; font-size:20px; }
</style>
</head>

<body>
